<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>K.ARI.N SCHNEIDER | MEMBRANE SYSTEM</title>
    <!-- Professional Video Engine: Video.js -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        :root { 
            --bg: #ffffff; 
            --text: #000000; 
            --accent: #666666; 
            --border: #dddddd; 
            --active-pulse: rgba(0, 0, 0, 0.02);
            --view-bg: #000000;
        }
        body.dark-mode { 
            --bg: #000000; 
            --text: #ffffff; 
            --accent: #999999; 
            --border: #333333; 
            --active-pulse: rgba(255, 255, 255, 0.08);
        }
        
        body { 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
            -webkit-font-smoothing: antialiased;
            background-color: var(--bg); color: var(--text); margin: 0; padding: 40px;
            font-size: 13px; line-height: 1.5; letter-spacing: -0.02em; 
            transition: background-color 0.2s, color 0.2s;
            padding-bottom: 120px; 
        }

        header { margin-bottom: 40px; border-bottom: 1px solid var(--text); padding-bottom: 20px; }
        .header-top { display: flex; justify-content: space-between; align-items: baseline; }
        
        .title { 
            font-size: 20px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; 
            cursor: pointer; user-select: none;
        }

        .btn { 
            background: none; border: 1px solid var(--text); color: var(--text);
            padding: 5px 12px; font-size: 10px; cursor: pointer; text-transform: uppercase;
            transition: 0.2s; letter-spacing: 1px; font-weight: bold;
        }
        .btn:hover { background: var(--text); color: var(--bg); }
        .btn.active { background: var(--text); color: var(--bg); }

        .nav-tags { display: flex; gap: 10px; margin-bottom: 40px; flex-wrap: wrap; }

        .admin-only { display: none; }
        body.admin-active .admin-only { display: block; }
        body.admin-active .admin-only-inline { display: inline-block; }
        body.admin-active .admin-only-cell { display: table-cell; }

        /* REGISTRATION OVERLAY */
        #reg-section { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9); z-index: 5000;
            display: none; justify-content: center; align-items: center;
            backdrop-filter: blur(10px);
        }
        
        .form-container { 
            width: 90%; max-width: 650px; padding: 25px; 
            border: 1px solid var(--text); background: var(--bg); 
            position: relative;
        }
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        label { font-size: 9px; text-transform: uppercase; color: var(--accent); margin-bottom: 2px; display: block; letter-spacing: 1px; font-weight: bold; }
        input, select, textarea { 
            background: none; border: 1px solid var(--border); padding: 8px; 
            color: var(--text); font-size: 12px; width: 100%; box-sizing: border-box;
            font-family: inherit; border-radius: 0;
        }
        textarea { grid-column: span 2; height: 50px; resize: none; }

        #form-preview-container {
            grid-column: span 2; height: 120px; background: #f0f0f0; border: 1px solid var(--border);
            display: flex; justify-content: center; align-items: center; margin-bottom: 5px;
            overflow: hidden; position: relative;
        }
        #form-preview-container img, #form-preview-container video { max-height: 100%; max-width: 100%; object-fit: contain; }
        body.dark-mode #form-preview-container { background: #111; }
        
        .form-close {
            position: absolute; top: 10px; right: 15px; cursor: pointer;
            font-size: 24px; color: var(--text); opacity: 0.5; transition: 0.2s;
        }

        /* THE MATRIX */
        .matrix { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { text-align: left; font-size: 9px; text-transform: uppercase; color: var(--accent); padding-bottom: 12px; border-bottom: 1px solid var(--text); letter-spacing: 1px; }
        td { padding: 20px 0; border-bottom: 1px solid var(--border); vertical-align: top; cursor: pointer; position: relative; }
        tr:hover td { background-color: var(--active-pulse); }

        .col-year { width: 75px; font-weight: bold; font-size: 13px; }
        .col-mode { width: 140px; color: var(--accent); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .col-status { width: 60px; text-align: center; }
        .col-actions { width: 80px; text-align: right; display: none; }

        /* Chromatic Status Protocol - Strict Visual Circle */
        .status-button {
            width: 14px !important; height: 14px !important; border-radius: 50% !important; 
            display: inline-block !important; cursor: pointer; border: none !important;
            padding: 0 !important; vertical-align: middle; 
            text-indent: -9999px; overflow: hidden; /* Force silence of words */
            transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }
        .status-available { background-color: #00cc00 !important; box-shadow: 0 0 10px rgba(0,204,0,0.2); }
        .status-available:hover { transform: scale(1.4); background-color: #00ff00 !important; }
        .status-reserved { background-color: #ffcc00 !important; transform: scale(0.8); }
        .status-sold { background-color: #888888 !important; transform: scale(0.8); }

        .action-btn { color: var(--accent); font-size: 16px; cursor: pointer; padding: 0 6px; transition: 0.2s; opacity: 0.4; }
        .action-btn:hover { color: var(--text); opacity: 1; }
        .del-btn:hover { color: #ff0000; }

        /* THE AGENT */
        #moving-agent {
            position: absolute; left: 15px; width: 12px; height: 12px; background-color: var(--text); border-radius: 50%;
            transition: top 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 5500; display: none;
        }
        .agent-active { display: block !important; animation: activatePulse 1s ease-in-out infinite; }
        @keyframes activatePulse {
            0% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(128, 128, 128, 0.5); }
            50% { transform: scale(3); opacity: 0; }
            100% { transform: scale(1); opacity: 0; }
        }

        /* VIEWING ROOM */
        #viewing-room {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--view-bg); z-index: 6000; display: none;
            justify-content: center; align-items: center; transition: background 0.3s;
        }
        #media-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; position: relative; padding: 80px; box-sizing: border-box; }
        .video-js { width: 100% !important; height: 100% !important; max-width: 100%; max-height: 100%; }
        
        .view-controls { position: absolute; top: 30px; right: 30px; z-index: 7000; display: flex; gap: 10px; align-items: center; }
        .bg-toggle { width: 18px; height: 18px; border: 1px solid rgba(128,128,128,0.5); cursor: pointer; transition: 0.2s; }
        .bg-toggle.black { background: #000; }
        .bg-toggle.white { background: #fff; }
        .bg-toggle.grey { background: #888; }
        .bg-toggle:hover { transform: scale(1.2); }

        .close-btn { background: var(--text); color: var(--bg); border: none; padding: 10px 18px; font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; margin-left: 20px; }
        .purchase-btn { position: absolute; top: 50%; right: 30px; transform: translateY(-50%); z-index: 7000; background: #00cc00; color: #fff; border: none; padding: 25px 10px; font-size: 10px; letter-spacing: 4px; cursor: pointer; text-transform: uppercase; writing-mode: vertical-rl; text-orientation: mixed; transition: 0.3s; }
        .purchase-btn:hover { background: #00ff00; }

        #dj-console { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--text); color: var(--bg); padding: 15px 40px; font-family: monospace; font-size: 10px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; box-sizing: border-box; border-top: 1px solid var(--border); }
        .db-controls { display: flex; gap: 20px; }
        .db-controls span { cursor: pointer; opacity: 0.6; transition: 0.2s; }
        .db-controls span:hover { opacity: 1; text-decoration: underline; }
    </style>
</head>
<body class="dark-mode">

<div id="moving-agent"></div>

<header>
    <div class="header-top">
        <div class="title" id="main-name" onclick="secretHandshake()">K.ARI.N SCHNEIDER</div>
        <div style="display: flex; gap: 10px;">
            <button class="btn" onclick="toggleMode()">Invert System</button>
        </div>
    </div>
</header>

<div class="nav-tags">
    <button class="btn admin-only" id="reg-btn" onclick="toggleReg()" style="border-style: dashed;">+ ADD ENTRY</button>
    <button class="btn active" onclick="filterMode('ALL', this)">ALL</button>
    <button class="btn" onclick="filterMode('CODE', this)">CODE</button>
    <button class="btn" onclick="filterMode('TIME-BASED MEDIA', this)">TIME-BASED MEDIA</button>
    <button class="btn" onclick="filterMode('PAINTING', this)">PAINTING</button>
    <button class="btn" onclick="filterMode('DRAWING', this)">DRAWING</button>
    <button class="btn" onclick="filterMode('+', this)">+</button>
</div>

<!-- REGISTRATION OVERLAY -->
<div id="reg-section" onclick="handleBgClick(event)">
    <div class="form-container" onclick="event.stopPropagation()">
        <div class="form-close" onclick="toggleReg()">×</div>
        <h2 id="form-title" style="font-size: 11px; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 2px;">Register New Work</h2>
        
        <div id="form-preview-container">
            <span style="font-size: 9px; opacity: 0.4;">PREVIEW_WINDOW</span>
        </div>

        <form id="archiveForm" class="grid-form">
            <input type="hidden" id="editing-id">
            
            <div>
                <label>Inventory ID</label>
                <input type="text" id="workId" placeholder="e.g. 2022_KS_TBM">
            </div>
            <div>
                <label>Year</label>
                <input type="text" id="year" placeholder="2022" required>
            </div>
            
            <div style="grid-column: span 2;">
                <label>Title</label>
                <input type="text" id="title" placeholder="Title of work">
            </div>

            <div>
                <label>Mode</label>
                <select id="mode">
                    <option value="TIME-BASED MEDIA">TIME-BASED MEDIA</option>
                    <option value="PAINTING">PAINTING</option>
                    <option value="DRAWING">DRAWING</option>
                    <option value="CODE">CODE</option>
                    <option value="+">+</option>
                </select>
            </div>
            <div>
                <label>Edition / Unique</label>
                <input type="text" id="edition" placeholder="Edition of 3">
            </div>

            <textarea id="materials" placeholder="Materials / Technique / Archive Notes"></textarea>

            <div>
                <label>Location</label>
                <input type="text" id="loc" placeholder="Studio/Database">
            </div>
            <div>
                <label>Status</label>
                <select id="status">
                    <option value="AVAILABLE">AVAILABLE</option>
                    <option value="RESERVED">RESERVED</option>
                    <option value="SOLD">SOLD</option>
                    <option value="PERMANENT COLLECTION">PERMANENT COLLECTION</option>
                </select>
            </div>

            <div style="grid-column: span 2;">
                <label>Manual Filename (Place in same folder)</label>
                <input type="text" id="manualPath" placeholder="video_name.mp4 or image_name.jpg">
            </div>

            <div style="grid-column: span 2;">
                <label>Upload Preview (Auto-populates filename)</label>
                <input type="file" id="mediaFile" style="border:none; padding:0;" onchange="handleFileSelection(this)">
            </div>

            <button type="submit" id="submit-btn" class="btn" style="grid-column: span 2; margin-top: 10px; padding: 10px; font-size: 11px;">COMMIT TO ARCHIVE</button>
            <button type="button" class="btn" onclick="toggleReg()" style="grid-column: span 2; border:none; opacity:0.4;">CANCEL</button>
        </form>
    </div>
</div>

<table class="matrix">
    <thead>
        <tr>
            <th class="col-year">YEAR</th>
            <th class="col-mode">MODE</th>
            <th>ENTRY / MATERIALS / CONTEXT</th>
            <th class="col-status">STATUS</th>
            <th class="col-actions admin-only-cell"></th>
        </tr>
    </thead>
    <tbody id="archive-list"></tbody>
</table>

<div id="viewing-room">
    <div class="view-controls">
        <div class="bg-toggle black" onclick="setViewBg('#000000')" title="Black"></div>
        <div class="bg-toggle white" onclick="setViewBg('#ffffff')" title="White"></div>
        <div class="bg-toggle grey" onclick="setViewBg('#888888')" title="Grey"></div>
        <button class="close-btn" onclick="closeRoom()">CLOSE ROOM</button>
    </div>
    <button id="purchaseInquiry" class="purchase-btn" onclick="sendInquiry()">INQUIRE</button>
    <div id="media-container"></div>
</div>

<div id="dj-console">
    <div id="console-display">MEMBRANE_SYSTEM: IDLE // AGENT_PROTOCOL: READY</div>
    <div class="db-controls">
        <a href="sandbox.html" style="color:inherit; text-decoration:none; opacity:0.6;">MASTER_CONSOLE</a>
        <span class="admin-only-inline" onclick="exportData()" style="margin-left: 20px;">EXPORT_ARCHIVE</span>
        <span class="admin-only-inline" onclick="importData()" style="margin-left: 20px;">IMPORT_ARCHIVE</span>
    </div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script>
    const STUDIO_ACCESS_CODE = 'studio'; 
    const INQUIRY_EMAIL = 'karinschneider5@icloud.com';

    let archive = [];
    let vjsPlayer = null;
    let activeWork = null;
    let isAdmin = sessionStorage.getItem('membrane_admin') === 'true';

    // FIRST: Try loading database.json if it exists on the GitHub raw repository
    const hydrateFromServer = async () => {
        try {
            const response = await fetch('karin_schneider_archive_master.json');
            if (response.ok) {
                const data = await response.json();
                if (Array.isArray(data) && data.length > 0) {
                    archive = data;
                    localStorage.setItem('membrane_archive', JSON.stringify(archive));
                    renderList();
                    console.log("Hydrated from committed master database successfully.");
                    return;
                }
            }
        } catch (e) {
            console.log("No remote database.json found. Reading local session memory instead.");
        }
        
        // SECOND: Fallback to LocalStorage if offline or no server file is loaded
        try {
            const stored = localStorage.getItem('membrane_archive');
            if (stored) archive = JSON.parse(stored);
        } catch(e) { console.error("Error loading archive", e); }
        renderList();
    };

    window.onload = () => {
        hydrateFromServer();
    };

    let currentFilter = 'ALL';

    function toggleMode() { 
        document.body.classList.toggle('dark-mode'); 
        const isDark = document.body.classList.contains('dark-mode');
        const brand = document.getElementById('main-name');
        brand.innerText = isDark ? "K.ARI.N SCHNEIDER" : "KARIN SCHNEIDER";
    }

    function secretHandshake() {
        const entry = prompt("Enter Studio Access Code:");
        if (!entry) return;
        if (entry.trim().toLowerCase() === STUDIO_ACCESS_CODE) {
            isAdmin = true;
            sessionStorage.setItem('membrane_admin', 'true');
            document.body.classList.add('admin-active');
            renderList();
        } else {
            isAdmin = false;
            sessionStorage.removeItem('membrane_admin');
            document.body.classList.remove('admin-active');
            renderList();
        }
    }

    if (isAdmin) document.body.classList.add('admin-active');

    function toggleReg(reset = true) {
        const s = document.getElementById('reg-section');
        const isHidden = s.style.display === 'none' || s.style.display === '';
        if (reset && isHidden) {
            document.getElementById('archiveForm').reset();
            document.getElementById('editing-id').value = '';
            document.getElementById('form-title').innerText = "Register New Work";
            document.getElementById('submit-btn').innerText = "COMMIT TO ARCHIVE";
            document.getElementById('form-preview-container').innerHTML = '<span style="font-size: 9px; opacity: 0.4;">PREVIEW_WINDOW</span>';
        }
        s.style.display = isHidden ? 'flex' : 'none';
        document.body.style.overflow = isHidden ? 'hidden' : 'auto';
    }

    function handleBgClick(e) { if(e.target.id === 'reg-section') toggleReg(); }

    function setViewBg(color) { document.getElementById('viewing-room').style.backgroundColor = color; }

    function sendInquiry() {
        if (!activeWork) return;
        const subject = encodeURIComponent(`Request for Access: ${activeWork.title}`);
        const body = encodeURIComponent(`Hello Karin,\n\nI am interested in viewing the following work in the Membrane System:\n\nTitle: ${activeWork.title}\nYear: ${activeWork.year}\n\nPlease provide access credentials.`);
        window.location.href = `mailto:${INQUIRY_EMAIL}?subject=${subject}&body=${body}`;
    }

    function handleFileSelection(input) {
        const file = input.files[0];
        if (!file) return;
        
        // Auto-populate Manual Filename field to ensure path remains accurate on GitHub Pages
        document.getElementById('manualPath').value = "artworks/" + file.name;
        
        const container = document.getElementById('form-preview-container');
        const src = URL.createObjectURL(file);
        if (file.type.startsWith('video')) {
            container.innerHTML = `<video src="${src}" muted preload="metadata" style="pointer-events: none;"></video>`;
        } else {
            container.innerHTML = `<img src="${src}">`;
        }
    }

    function openEditForm(e, id) {
        e.stopPropagation();
        const item = archive.find(i => String(i.id) === String(id));
        if (!item) return;
        document.getElementById('editing-id').value = item.id;
        document.getElementById('workId').value = item.workId || '';
        document.getElementById('year').value = item.year || '';
        document.getElementById('title').value = item.title || '';
        document.getElementById('mode').value = item.mode || 'TIME-BASED MEDIA';
        document.getElementById('loc').value = item.loc || '';
        document.getElementById('edition').value = item.edition || '';
        document.getElementById('materials').value = item.materials || '';
        document.getElementById('status').value = item.status || 'AVAILABLE';
        document.getElementById('manualPath').value = item.manualPath || '';
        
        const container = document.getElementById('form-preview-container');
        if (item.type === 'video') {
            container.innerHTML = `<video src="${item.manualPath}" muted preload="metadata"></video>`;
        } else {
            container.innerHTML = `<img src="${item.manualPath}">`;
        }
        
        toggleReg(false);
    }

    document.getElementById('archiveForm').onsubmit = function(e) {
        e.preventDefault();
        const editingId = document.getElementById('editing-id').value;
        const fileInput = document.getElementById('mediaFile');
        const file = fileInput.files[0];
        const manualPath = document.getElementById('manualPath').value.trim();
        const mode = document.getElementById('mode').value;
        let titleInput = document.getElementById('title').value.trim() || (mode === "+" ? "+" : "UNTITLED " + mode);

        let src = manualPath;
        if (editingId && !src) {
            const oldItem = archive.find(i => String(i.id) === String(editingId));
            if (oldItem) src = oldItem.src;
        }
        if (!src) return;

        const pathString = (manualPath || (file ? file.name : "") || src).toLowerCase();
        const isVideo = pathString.endsWith('.mp4') || pathString.endsWith('.mov') || pathString.endsWith('.m4v') || pathString.endsWith('.avi') || pathString.endsWith('.webm');
        
        const entryData = {
            workId: document.getElementById('workId').value,
            year: document.getElementById('year').value,
            mode: mode,
            title: titleInput,
            loc: document.getElementById('loc').value,
            edition: document.getElementById('edition').value,
            materials: document.getElementById('materials').value,
            status: document.getElementById('status').value,
            manualPath: manualPath,
            src: src,
            type: isVideo ? "video" : "image"
        };
        
        if (editingId) {
            const index = archive.findIndex(i => String(i.id) === String(editingId));
            archive[index] = { ...archive[index], ...entryData, id: editingId };
        } else {
            entryData.id = String(Date.now() + Math.random());
            archive.push(entryData);
        }
        localStorage.setItem('membrane_archive', JSON.stringify(archive));
        renderList();
        toggleReg();
    };

    function deleteWork(e, id) {
        e.stopPropagation(); 
        archive = archive.filter(item => String(item.id) !== String(id));
        localStorage.setItem('membrane_archive', JSON.stringify(archive));
        renderList();
    }

    function filterMode(mode, btn) {
        currentFilter = mode;
        document.querySelectorAll('.nav-tags .btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderList();
    }

    function renderList() {
        const list = document.getElementById('archive-list');
        list.innerHTML = '';
        const sorted = [...archive].sort((a,b) => b.year - a.year);
        sorted.forEach((item) => {
            if (currentFilter !== 'ALL' && item.mode !== currentFilter) return;
            const row = document.createElement('tr');
            row.onclick = function() { activateWork(this, item); };
            
            const yearTd = document.createElement('td'); yearTd.className = 'col-year'; yearTd.innerText = item.year;
            const modeTd = document.createElement('td'); modeTd.className = 'col-mode'; modeTd.innerText = item.mode;
            const entryTd = document.createElement('td'); entryTd.style.paddingRight = '30px';
            const titleStrong = document.createElement('strong'); titleStrong.innerText = item.title; entryTd.appendChild(titleStrong);
            
            if (item.edition) {
                const editionSpan = document.createElement('span'); editionSpan.style.opacity = '0.4'; editionSpan.style.fontSize = '9px'; editionSpan.style.marginLeft = '22px'; editionSpan.innerText = `[${item.edition}]`; entryTd.appendChild(editionSpan);
            }
            
            if (item.materials) {
                const br = document.createElement('br'); const materialsSpan = document.createElement('span'); 
                materialsSpan.style.opacity = '0.6'; materialsSpan.style.fontSize = '11px'; 
                materialsSpan.style.display = 'block'; materialsSpan.style.marginTop = '5px'; 
                materialsSpan.innerText = item.materials; entryTd.appendChild(br); entryTd.appendChild(materialsSpan);
            }

            const statusTd = document.createElement('td'); statusTd.className = 'col-status';
            const statusBtn = document.createElement('button'); statusBtn.className = 'status-button';
            statusBtn.innerHTML = ''; // Absolute visual silence
            
            if (item.status === 'AVAILABLE') statusBtn.classList.add('status-available');
            else if (item.status === 'RESERVED') statusBtn.classList.add('status-reserved');
            else statusBtn.classList.add('status-sold');
            
            statusBtn.onclick = function(e) { e.stopPropagation(); if(item.status === 'AVAILABLE') { activeWork = item; sendInquiry(); } };
            statusTd.appendChild(statusBtn);
            row.appendChild(yearTd); row.appendChild(modeTd); row.appendChild(entryTd); row.appendChild(statusTd);
            
            if (isAdmin) {
                const actionsTd = document.createElement('td'); actionsTd.className = 'col-actions'; actionsTd.style.display = 'table-cell';
                const editSpan = document.createElement('span'); editSpan.className = 'action-btn'; editSpan.innerText = '✎'; editSpan.onclick = (e) => openEditForm(e, item.id);
                const delSpan = document.createElement('span'); delSpan.className = 'action-btn del-btn'; delSpan.innerText = '×'; delSpan.onclick = (e) => deleteWork(e, item.id);
                actionsTd.appendChild(editSpan); actionsTd.appendChild(delSpan); row.appendChild(actionsTd);
            }
            list.appendChild(row);
        });
    }

    function activateWork(element, item) {
        const agent = document.getElementById('moving-agent');
        const rect = element.getBoundingClientRect();
        const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        agent.style.top = (rect.top + scrollTop + (rect.height / 2) - 6) + "px";
        agent.classList.add('agent-active');
        document.getElementById('console-display').innerText = `SIGNALING: ${item.title.toUpperCase()} // AGENT: ENGAGED`;
        setTimeout(() => { openRoom(item); }, 800); 
    }

    function openRoom(item) {
        const room = document.getElementById('viewing-room');
        const container = document.getElementById('media-container');
        if (vjsPlayer) { vjsPlayer.dispose(); vjsPlayer = null; }
        container.innerHTML = '';
        room.style.display = 'flex';
        document.body.style.overflow = 'hidden';
        activeWork = item;
        
        // CHECK IF IT IS AN EXTERNAL WEBSITE LINK (LIKE WRAPING) OR HAS HTTP IN PATH
        if (item.src.toLowerCase().startsWith('http://') || item.src.toLowerCase().startsWith('https://')) {
            // Embed live webpage as iframe in the Void
            const iframe = document.createElement('iframe');
            iframe.src = item.src;
            iframe.style.width = "100%";
            iframe.style.height = "100%";
            iframe.style.border = "none";
            container.appendChild(iframe);
            document.getElementById('console-display').innerText = `IMMERSED_LIVE_PORTAL: ${item.title.toUpperCase()}`;
        } else if (item.type === 'video') {
            const vidId = 'studio-player-' + Date.now();
            const vidEl = document.createElement('video');
            vidEl.id = vidId;
            vidEl.className = 'video-js vjs-big-play-centered vjs-theme-city';
            vidEl.setAttribute('controls', 'true');
            vidEl.setAttribute('preload', 'auto');
            vidEl.setAttribute('playsinline', 'true');
            vidEl.style.width = "100%"; vidEl.style.height = "100%";
            container.appendChild(vidEl);
            
            // Clean Source Assignment - NO Query Strings for local file support
            vjsPlayer = videojs(vidId, { 
                autoplay: 'muted', 
                muted: true, 
                fluid: false, 
                responsive: true, 
                sources: [{ src: item.manualPath, type: item.manualPath.toLowerCase().endsWith('.mov') ? 'video/quicktime' : 'video/mp4' }]
            vjsPlayer.ready(function() { this.play().catch(e => { this.muted(true); this.play(); }); });
        } else {
            const img = document.createElement('img');
            img.src = item.manualPath; img.style.maxWidth = "85%"; img.style.maxHeight = "85%"; img.style.objectFit = "contain"; img.style.display = "block";
            img.onerror = () => { container.innerHTML = `<div style="color:white; font-family:monospace; font-size:11px; text-align:center;">ERROR: MEDIA_NOT_FOUND // CHECK_FILENAME: ${item.manualPath}</div>`; };
            container.appendChild(img);
        }
    }

    function closeRoom() {
        if (vjsPlayer) { vjsPlayer.dispose(); vjsPlayer = null; }
        document.getElementById('viewing-room').style.display = 'none';
        document.getElementById('media-container').innerHTML = '';
        document.getElementById('moving-agent').classList.remove('agent-active');
        document.body.style.overflow = 'auto';
        document.getElementById('console-display').innerText = "MEMBRANE_SYSTEM: IDLE // AGENT: STANDBY";
        setViewBg('#000000'); 
    }

    function exportData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(archive));
        const link = document.createElement('a'); link.setAttribute("href", dataStr); link.setAttribute("download", "karin_schneider_archive_master.json"); document.body.appendChild(link); link.click(); link.remove();
    }

    function importData() {
        const input = document.createElement('input'); input.type = 'file';
        input.onchange = e => {
            const reader = new FileReader(); reader.readAsText(e.target.files[0], 'UTF-8');
            reader.onload = re => { try { archive = JSON.parse(re.target.result); localStorage.setItem('membrane_archive', JSON.stringify(archive)); renderList(); } catch(err) {} }
        }; input.click();
    }
    renderList();
</script>
</body>
</html>
