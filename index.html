<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karin Schneider | System Index</title>
    <style>
        :root { --bg: #ffffff; --text: #000000; --accent: #666666; --border: #dddddd; }
        body.dark-mode { --bg: #000000; --text: #ffffff; --accent: #999999; --border: #333333; }
        
        body { 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
            -webkit-font-smoothing: antialiased;
            background-color: var(--bg); color: var(--text); margin: 40px; 
            font-size: 13px; line-height: 1.5; letter-spacing: -0.01em; 
            transition: background-color 0.2s, color 0.2s;
        }

        header { margin-bottom: 60px; border-bottom: 2px solid var(--text); padding-bottom: 20px; }
        .header-top { display: flex; justify-content: space-between; align-items: baseline; }
        
        .title { font-size: 20px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }
        
        .controls { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        .filter-btn, .mode-toggle { 
            border: 1px solid var(--text); background: none; padding: 4px 12px; 
            cursor: pointer; font-size: 11px; text-transform: uppercase; 
            font-weight: 500; color: var(--text); transition: all 0.2s;
        }
        .filter-btn.active { background: var(--text); color: var(--bg); }

        .matrix { width: 100%; border-collapse: collapse; margin-top: 20px; table-layout: fixed; }
        th { text-align: left; font-size: 14px; text-transform: uppercase; color: var(--accent); padding-bottom: 10px; border-bottom: 1px solid var(--text); }
        td { padding: 12px 0; border-bottom: 1px solid var(--border); vertical-align: top; }
        
        .col-year { width: 80px; font-weight: bold; }
        .col-mode { width: 100px; color: var(--accent); font-size: 11px; text-transform: uppercase; }
        .col-entry { width: 25%; font-weight: bold; }
        .col-venue { width: 25%; }
        .col-location { width: 20%; color: var(--accent); }
          
        .hidden { display: none; }
        a { color: inherit; text-decoration: none; border-bottom: 1px solid var(--accent); }
        @media screen and (max-width: 768px) {
        .matrix thead { display: none; }
        .data-row {
            display: block;
            padding: 15px 0;
            border-bottom: 1px solid var(--text);
        }
        .matrix td {
            display: block;
            width: 100% !important;
            padding: 2px 0;
            border: none;
        }
        .col-year { font-size: 11px; margin-bottom: 2px; }
        .col-mode { font-size: 10px; opacity: 0.7; }
        .controls {
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 10px;
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <div class="title" id="main-name">Karin Schneider</div>
        <button class="mode-toggle" onclick="toggleMode()">Invert System</button>
    </div>
    <div class="controls" id="nav-filters">
        <button class="filter-btn active" onclick="filter('all')">All</button>
        </div>
</header>

<table class="matrix">
    <thead>
        <tr>
            <th class="col-year">Year</th>
            <th class="col-mode">Mode</th>
            <th class="col-entry">Entry / Context</th>
            <th class="col-venue">□</th>
            <th class="col-location">⚲</th>
            
        </tr>
    </thead>
    <tbody id="data-body"></tbody>
</table>

<script>
    async function initSystem() {
        const response = await fetch('data.vcs');
        const csvText = await response.text();
        const body = document.getElementById('data-body');

        // Split lines and remove the header
        const lines = csvText.trim().split('\n').slice(1);
        
        const workData = lines.map(line => {
            const cols = line.split(',');
            return {
                year: (cols[0] || "").trim(),
                mode: (cols[1] || "").trim(),
                entry: (cols[2] || "").trim(),
                context: (cols[3] || "").trim(),
                venue: (cols[4] || "").trim(),
                location: (cols[5] || "").trim()
            };
        });

        body.innerHTML = workData.map(item => {
            const rawType = item.mode.toLowerCase().trim();
            let filterClass = 'plus'; 

            // Grouping Logic
            if (['solo', 'group', 'screening', 'performance', 'other'].includes(rawType)) {
                filterClass = 'shows';
            } else if (['press', 'publication', 'publications', 'editorial', 'essay', 'writing'].includes(rawType)) {
                filterClass = 'writing';
            } else if (['film', 'video', '16 mm', 'sound', 'multi', 'digital video', '4k'].includes(rawType)) {
                filterClass = 'time-based media';
            } else if (rawType.includes('collect')) {
                filterClass = 'collection';
            } else if (rawType.includes('founding')) {
                filterClass = 'founding';
            } else if (rawType === 'code') {
                filterClass = 'code';
            }

            // Visual Rules
            const isCollection = filterClass === 'collection' || filterClass === 'founding';
            const displayYear = (isCollection || item.year.toLowerCase().includes('ongoing')) ? '' : item.year;
            const displayMode = isCollection ? '' : item.mode;
            const displayContext = isCollection ? '' : (item.context ? ` / ${item.context}` : '');

          return `
              <tr class="data-row" data-filter="${filterClass}">
              <td class="col-year">${displayYear}</td>
              <td class="col-mode">${displayMode}</td>
              <td class="col-main">
              <strong>${item.entry}</strong>
             <div style="font-weight: normal; color: var(--accent); margin-top: 4px;">${displayContext}</div>
        </td>
        <td class="col-venue">${item.venue}</td>
        <td class="col-location">${item.location}</td>
    </tr>
`;
        }).join('');

        // Navigation Menu
        const categories = ["code", "time-based media", "shows", "writing", "collection", "founding"];
        const nav = document.getElementById('nav-filters');
        nav.innerHTML = '<button class="filter-btn active" onclick="filter(\'all\')">all</button>';
        categories.forEach(cat => {
            nav.innerHTML += `<button class="filter-btn" onclick="filter('${cat}')">${cat}</button>`;
        });
        nav.innerHTML += `<button class="filter-btn" onclick="filter('plus')">+</button>`;
    }

    function filter(type) {
        document.querySelectorAll('.filter-btn').forEach(btn => {
            const label = btn.innerText.toLowerCase();
            btn.classList.toggle('active', (type === 'plus' ? btn.innerText === '+' : label === type));
        });
        document.querySelectorAll('.data-row').forEach(row => {
            const rowFilter = row.getAttribute('data-filter');
            row.classList.toggle('hidden', type !== 'all' && rowFilter !== type);
        });
    }

    function toggleMode() { 
        document.body.classList.toggle('dark-mode');
        document.getElementById('main-name').innerText = document.body.classList.contains('dark-mode') ? "K.ari.n Schneider" : "KARIN SCHNEIDER";
    }

    initSystem();
</script>

<footer>
    #K.ari.n Schneider 2026 &copy; karinschneider.com
</footer>

</body>
</html>
