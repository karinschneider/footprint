<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K.ari.n Schneider | MASTER CONSOLE</title>
    <style>
        :root { 
            --bg: #ffffff; 
            --text: #000000; 
            --accent: #666666; 
            --border: #dddddd; 
        }
        body.dark-mode { 
            --bg: #000000; 
            --text: #ffffff; 
            --accent: #999999; 
            --border: #333333; 
        }
        
        body { 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
            -webkit-font-smoothing: antialiased;
            background-color: var(--bg); color: var(--text); margin: 0; padding: 40px;
            font-size: 13px; line-height: 1.5; letter-spacing: -0.02em; 
            transition: background-color 0.2s, color 0.2s;
            height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            position: relative; /* Anchors the absolute footer at the bottom */
        }

        header { margin-bottom: 40px; border-bottom: 1px solid var(--text); padding-bottom: 20px; }
        .header-top { display: flex; justify-content: space-between; align-items: baseline; }
        .title { font-size: 20px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }

        .btn { 
            background: none; border: 1px solid var(--text); color: var(--text);
            padding: 5px 12px; font-size: 10px; cursor: pointer; text-transform: uppercase;
            transition: 0.2s; letter-spacing: 1px; font-weight: bold;
        }
        .btn:hover { background: var(--text); color: var(--bg); }

        .console-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding-bottom: 60px; /* Prevents center block overlapping footer on tiny screens */
        }

        .console-box { 
            text-align: left;
            display: inline-block;
            box-sizing: border-box;
            width: 100%;
            max-width: 280px; 
        }

        .nav { 
            display: flex;
            flex-direction: column;
            gap: 28px; 
            align-items: flex-start;
        }

        .link { 
            color: var(--accent); 
            text-decoration: none; 
            font-size: 11px; 
            border-bottom: 1.5px solid transparent;
            padding-bottom: 5px; 
            transition: all 0.2s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .link:hover { 
            color: var(--text); 
            border-bottom: 1.5px solid var(--text);
        }

        /* Creates substantial breathing room below the four links */
        .status-bar { 
            margin-top: 56px; 
            font-size: 9px; 
            color: var(--accent); 
            font-family: monospace; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Matches the style from index.html but positions it on the bottom right */
        footer {
            position: absolute;
            bottom: 40px;
            right: 40px;
            font-size: 11px;
            color: var(--accent);
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            letter-spacing: normal;
            text-transform: none;
        }
    </style>
</head>
<body class="dark-mode">

    <header>
        <div class="header-top">
            <div class="title" id="main-name">K.ARI.N SCHNEIDER</div>
            <button class="btn" onclick="toggleInvert()">Invert System</button>
        </div>
    </header>

    <div class="console-wrapper">
        <div class="console-box">
            <div class="nav">
                <a href="index.html" class="link">FOOTPRINT</a>
                <a href="database.html" class="link">VIEWING ROOM</a>
                <a href="https://chromastacks.github.io/chromastacks/" class="link">CHROMASTACKS</a>
                <a href="commons.html" class="link">THE COMMONS</a>
            </div>
            
            <div class="status-bar">LOCAL_ENVIRONMENT: ACTIVE</div>
        </div>
    </div>

    <footer>
        <div>#K.ari.n Schneider 2026 © karinschneider.com</div>
    </footer>

    <script>
        function toggleInvert() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            const brand = document.getElementById('main-name');
            brand.innerText = isDark ? "K.ARI.N SCHNEIDER" : "KARIN SCHNEIDER";
        }
    </script>
</body>
</html></html>
