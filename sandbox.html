<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K.ARI.N SCHNEIDER | MASTER CONSOLE</title>
    <style>
        :root { 
            --bg: #ffffff; 
            --text: #000000; 
            --accent: #666666; 
            --border: #dddddd; 
        }
        body.dark-mode { 
            --bg: #000000; 
            --text: #ffffff; 
            --accent: #999999; 
            --border: #333333; 
        }
        
        body { 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
            -webkit-font-smoothing: antialiased;
            background-color: var(--bg); color: var(--text); margin: 0; padding: 40px;
            font-size: 13px; line-height: 1.5; letter-spacing: -0.02em; 
            transition: background-color 0.2s, color 0.2s;
            height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        header { margin-bottom: 40px; border-bottom: 1px solid var(--text); padding-bottom: 20px; }
        .header-top { display: flex; justify-content: space-between; align-items: baseline; }
        .title { font-size: 20px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }

        .btn { 
            background: none; border: 1px solid var(--text); color: var(--text);
            padding: 5px 12px; font-size: 10px; cursor: pointer; text-transform: uppercase;
            transition: 0.2s; letter-spacing: 1px; font-weight: bold;
        }
        .btn:hover { background: var(--text); color: var(--bg); }
        .btn.active { background: var(--text); color: var(--bg); }

        .console-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Centered Box matching your screenshot exactly */
        .console-box { 
            border: 1px solid var(--border); 
            padding: 80px; 
            text-align: center;
            width: 90%;
            max-width: 500px;
            box-sizing: border-box;
            background-color: var(--bg);
            transition: background-color 0.3s, border-color 0.3s;
        }

        .nav { 
            display: flex; 
            gap: 40px; 
            justify-content: center;
            margin-bottom: 40px;
        }

        .link { 
            color: var(--accent); 
            text-decoration: none; 
            font-size: 11px; 
            border-bottom: 1.5px solid transparent;
            padding-bottom: 5px; 
            transition: all 0.2s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .link:hover { 
            color: var(--text); 
            border-bottom: 1.5px solid var(--text);
        }

        .status-bar { 
            font-size: 9px; 
            color: var(--accent); 
            font-family: monospace; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="dark-mode">

    <header>
        <div class="header-top">
            <div class="title" id="main-name">K.ARI.N SCHNEIDER</div>
            <button class="btn" onclick="toggleInvert()">Invert System</button>
        </div>
    </header>

    <div class="console-wrapper">
        <div class="console-box">
            <div class="nav">
                <a href="index.html" class="link">FOOTPRINT</a>
                <a href="database.html" class="link">MEMBRANE</a>
            </div>
            
            <div class="status-bar">LOCAL_ENVIRONMENT: ACTIVE</div>
        </div>
    </div>

    <script>
        function toggleInvert() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            const brand = document.getElementById('main-name');
            
            // Dynamic change to full caps without dots when turned to white
            brand.innerText = isDark ? "K.ARI.N SCHNEIDER" : "KARIN SCHNEIDER";
        }
    </script>
</body>
</html>
